<!DOCTYPE html>
<html lang="ro" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BOBO Browser — Navigare privată</title>
<meta name="description" content="BOBO Browser — browser privat european. Fără istoric, fără tracking, fără reclame. Gratuit și open-source." />
<meta name="author" content="Danciut Grigore Bogdan" />
<link rel="canonical" href="https://bobobrowser.eu/" />
<link rel="icon" href="bobo_icon_64.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic&family=Noto+Sans+Hebrew&family=Noto+Sans+Devanagari&family=Noto+Sans+Bengali&family=Noto+Sans+Tamil&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#b8935a;
    --gold-light:#c8a870;
    --bg:#0e0c0a;
    --bg2:#141210;
    --bg3:#1a1610;
    --text:#d8cdb8;
    --muted:#8a8068;
    --green:#1d9e75;
    --line:#2a2218;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif;}
  a{color:var(--gold-light);text-decoration:none;}

  /* ===== LANGUAGE OVERLAY (first visit) ===== */
  #lang-overlay{
    position:fixed;inset:0;z-index:9999;
    background:var(--bg);
    display:flex;flex-direction:column;align-items:center;
    overflow-y:auto;
    padding:48px 20px 120px;
  }
  .ov-logo{
    width:88px;height:88px;border-radius:20px;
    border:1px solid var(--line);
    box-shadow:0 0 50px rgba(184,147,90,.2);
    margin-bottom:24px;
  }
  #ov-title{
    font-family:Georgia,serif;font-size:26px;
    color:var(--gold-light);letter-spacing:2px;
    margin-bottom:8px;text-align:center;
  }
  #ov-sub{
    font-size:13px;color:var(--muted);
    margin-bottom:36px;text-align:center;
    letter-spacing:.5px;
  }
  .ov-grid-wrap{width:100%;max-width:620px;}
  .ov-group-hdr{
    font-size:10px;font-weight:700;letter-spacing:2px;
    color:var(--muted);text-transform:uppercase;
    padding:18px 0 8px;
    border-top:1px solid var(--line);
    margin-top:4px;
  }
  .ov-group-hdr:first-child{border-top:none;padding-top:0;}
  .ov-lang-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    margin-bottom:4px;
  }
  .ov-btn{
    display:flex;align-items:center;gap:10px;
    background:rgba(20,18,16,.85);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;
    cursor:pointer;color:var(--text);
    transition:.15s;text-align:left;width:100%;
  }
  .ov-btn:hover{border-color:var(--gold);background:var(--bg2);box-shadow:0 0 12px rgba(184,147,90,.12);}
  .ov-btn.sel{border-color:#FFD700;background:var(--bg3);box-shadow:0 0 14px rgba(255,215,0,.18);}
  .ov-btn .ob-flag{font-size:22px;flex-shrink:0;line-height:1;}
  .ov-btn .ob-name{font-size:13px;line-height:1.3;font-weight:500;}
  .ov-continue-bar{
    position:fixed;bottom:0;left:0;right:0;
    padding:14px 20px 22px;
    background:linear-gradient(transparent,var(--bg) 38%);
    display:flex;justify-content:center;
    z-index:10000;pointer-events:none;
  }
  #ov-continue{
    background:linear-gradient(135deg,var(--gold),var(--gold-light));
    color:#0e0c0a;font-weight:700;font-size:16px;
    padding:15px 0;border-radius:11px;
    border:none;cursor:pointer;letter-spacing:.5px;
    transition:.18s;width:100%;max-width:520px;
    opacity:.35;pointer-events:none;
  }
  #ov-continue.ready{opacity:1;pointer-events:all;}
  #ov-continue.ready:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,147,90,.35);}

  /* ===== LANGUAGE DROPDOWN (nav) ===== */
  #lang-sel{position:relative;}
  #lang-btn{
    display:flex;align-items:center;gap:6px;
    background:transparent;border:1px solid var(--line);
    border-radius:8px;padding:6px 12px;
    color:var(--gold-light);font-size:13px;font-weight:600;
    cursor:pointer;transition:.15s;letter-spacing:.5px;
    white-space:nowrap;
  }
  #lang-btn:hover{border-color:var(--gold);}
  #lang-btn .lb-arrow{font-size:9px;color:var(--muted);transition:transform .2s;margin-left:2px;}
  #lang-btn.open .lb-arrow{transform:rotate(180deg);}
  #lang-drop{
    display:none;position:absolute;
    top:calc(100% + 6px);
    inset-inline-end:0;
    min-width:220px;max-height:370px;overflow-y:auto;
    background:var(--bg2);border:1px solid var(--line);
    border-radius:12px;padding:6px;
    z-index:300;
    box-shadow:0 14px 44px rgba(0,0,0,.65);
  }
  #lang-drop.open{display:block;}
  #lang-drop::-webkit-scrollbar{width:4px;}
  #lang-drop::-webkit-scrollbar-track{background:transparent;}
  #lang-drop::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
  .dd-group{
    font-size:10px;font-weight:700;letter-spacing:2px;
    color:var(--muted);text-transform:uppercase;
    padding:8px 10px 4px;
  }
  .dd-item{
    display:flex;align-items:center;gap:8px;
    padding:8px 10px;border-radius:7px;
    cursor:pointer;color:var(--text);font-size:13px;
    transition:.1s;
  }
  .dd-item:hover{background:var(--bg3);color:var(--gold-light);}
  .dd-item.act{color:var(--gold-light);background:var(--bg3);}
  .dd-item .di-flag{font-size:15px;flex-shrink:0;}
  .dd-item .di-name{flex:1;}
  .dd-item .di-code{font-size:10px;color:var(--muted);}

  /* ===== RTL support ===== */
  [dir="rtl"] body{
    font-family:"Noto Sans Arabic","Noto Sans Hebrew","Segoe UI",system-ui,sans-serif;
  }
  [dir="rtl"] #lang-drop{
    inset-inline-end:0;
  }
  /* Font overrides for special scripts */
  html[lang="ar"] body,html[lang="ar"] *:not(.ob-flag):not(.di-flag):not(.lb-flag){
    font-family:"Noto Sans Arabic","Segoe UI",sans-serif!important;
  }
  html[lang="he"] body,html[lang="yi"] body{
    font-family:"Noto Sans Hebrew","Segoe UI",sans-serif!important;
  }
  html[lang="hi"] body{font-family:"Noto Sans Devanagari","Segoe UI",sans-serif!important;}
  html[lang="bn"] body{font-family:"Noto Sans Bengali","Segoe UI",sans-serif!important;}
  html[lang="ta"] body{font-family:"Noto Sans Tamil","Segoe UI",sans-serif!important;}

  /* ===== Nav ===== */
  nav{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 32px;
    background:rgba(14,12,10,.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav-brand{
    font-family:Georgia,serif;font-size:20px;font-weight:bold;
    letter-spacing:3px;color:var(--gold-light);
  }
  .nav-brand small{font-size:11px;letter-spacing:2px;color:var(--muted);font-weight:normal;}

  /* ===== Layout ===== */
  section{padding:80px 32px;max-width:1080px;margin:0 auto;}
  .center{text-align:center;}

  /* ===== Hero ===== */
  .hero{padding-top:70px;padding-bottom:60px;}
  .hero img{
    width:150px;height:150px;border-radius:24px;
    border:1px solid var(--line);
    box-shadow:0 0 60px rgba(184,147,90,.15);
  }
  .hero h1{
    font-size:56px;letter-spacing:8px;margin:28px 0 6px;
    color:var(--gold-light);font-weight:bold;
  }
  .hero .tagline{
    font-size:20px;color:var(--text);max-width:620px;
    margin:14px auto 8px;font-style:italic;
  }
  .hero .sub{font-size:14px;color:var(--muted);letter-spacing:1px;margin-bottom:34px;}

  .btn{
    display:inline-block;
    background:linear-gradient(135deg,var(--gold),var(--gold-light));
    color:#0e0c0a;font-weight:700;font-size:16px;
    padding:15px 38px;border-radius:11px;
    border:none;cursor:pointer;
    transition:.18s;letter-spacing:.5px;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,147,90,.35);}
  .btn-note{display:block;font-size:12px;color:var(--muted);margin-top:12px;letter-spacing:.5px;}

  .gold-line{
    width:80px;height:2px;margin:0 auto;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }

  h2{font-size:34px;color:var(--gold-light);margin-bottom:14px;letter-spacing:1px;}
  .lead{font-size:17px;color:var(--text);max-width:720px;margin:0 auto;}

  /* ===== Features ===== */
  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:20px;margin-top:46px;
  }
  .card{
    background:var(--bg2);border:1px solid var(--line);
    border-radius:14px;padding:26px 24px;
    transition:.18px;
  }
  .card:hover{border-color:var(--gold);transform:translateY(-3px);}
  .card .ico{font-size:26px;margin-bottom:12px;}
  .card h3{font-size:18px;color:var(--gold-light);margin-bottom:8px;}
  .card p{font-size:14px;color:var(--muted);line-height:1.6;}

  /* ===== Privacy table ===== */
  .privacy{background:var(--bg2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  table{
    width:100%;max-width:760px;margin:40px auto 0;
    border-collapse:collapse;font-size:15px;
  }
  th,td{padding:14px 18px;text-align:left;border-bottom:1px solid var(--line);}
  thead th{color:var(--gold-light);font-family:Georgia,serif;font-size:15px;}
  th:nth-child(2),td:nth-child(2),
  th:nth-child(3),td:nth-child(3){text-align:center;width:170px;}
  .yes{color:var(--green);font-weight:600;}
  .no{color:#9a6a5a;font-weight:600;}
  tbody td:first-child{color:var(--text);}

  /* ===== Download ===== */
  .download{text-align:center;}
  .req{
    display:inline-flex;flex-wrap:wrap;gap:10px 26px;justify-content:center;
    margin-top:26px;font-size:13px;color:var(--muted);
  }
  .req span::before{content:"•  ";color:var(--gold);}

  /* ===== Platform cards ===== */
  .platform-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:24px;margin-top:36px;max-width:820px;margin-left:auto;margin-right:auto;
  }
  .platform-card{
    background:var(--bg2);border:1px solid var(--line);
    border-radius:16px;padding:32px 28px;text-align:center;
    transition:.18s;
  }
  .platform-card:hover{border-color:var(--gold);}
  .platform-card .plat-icon{font-size:38px;margin-bottom:14px;}
  .platform-card h3{font-size:18px;color:var(--gold-light);margin-bottom:8px;font-family:Georgia,serif;}
  .platform-card .plat-note{font-size:12px;color:var(--muted);margin-top:12px;letter-spacing:.5px;display:block;}
  .platform-card .plat-req{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.8;}
  .btn-android{
    display:inline-block;
    background:linear-gradient(135deg,#2a7a4a,#3a9a5c);
    color:#fff;font-weight:700;font-size:16px;
    padding:15px 38px;border-radius:11px;
    border:none;cursor:pointer;
    transition:.18s;letter-spacing:.5px;
  }
  .btn-android:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(42,122,74,.35);}
  .badge-beta{
    display:inline-block;background:#2a3a2a;border:1px solid #3a6a4a;
    color:#5abd7a;font-size:10px;font-weight:700;letter-spacing:1px;
    padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;
  }

  /* ===== Install Guide ===== */
  .steps-list{
    max-width:680px;margin:36px auto 0;
    text-align:left;display:flex;flex-direction:column;gap:14px;
  }
  .step-item{
    display:flex;gap:16px;align-items:flex-start;
    background:var(--bg2);border:1px solid var(--line);
    border-radius:12px;padding:18px 20px;
    transition:.18s;
  }
  .step-item:hover{border-color:var(--gold);}
  .step-num{
    background:linear-gradient(135deg,var(--gold),var(--gold-light));
    color:#0e0c0a;font-weight:700;font-size:14px;
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;margin-top:2px;
  }
  .step-text{font-size:14px;color:var(--text);line-height:1.75;}
  .step-text strong{color:var(--gold-light);}
  .step-path{
    font-size:12px;color:var(--muted);
    background:var(--bg3);border:1px solid var(--line);
    border-radius:6px;padding:8px 12px;margin-top:8px;
    display:block;line-height:1.9;white-space:pre-line;
  }
  .safety-box{
    max-width:680px;margin:28px auto 0;
    background:#0e1a12;border:1px solid #2a4a35;
    border-radius:12px;padding:18px 22px;
    font-size:13px;color:#7abf9a;line-height:1.75;
    text-align:left;
  }
  .safety-box strong{color:#9ade9a;}

  /* ===== Footer ===== */
  footer{
    text-align:center;padding:46px 32px;
    border-top:1px solid var(--line);
  }
  .footer-brand{
    font-family:Georgia,serif;font-size:17px;letter-spacing:3px;
    color:var(--gold-light);
  }
  .footer-sub{font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:1px;}

  /* ===== Responsive ===== */
  @media(max-width:780px){
    section{padding:56px 22px;}
    nav{padding:12px 20px;}
    .hero h1{font-size:40px;letter-spacing:5px;}
    .hero .tagline{font-size:17px;}
    .grid{grid-template-columns:1fr;}
    h2{font-size:27px;}
    th:nth-child(2),td:nth-child(2),
    th:nth-child(3),td:nth-child(3){width:auto;}
    th,td{padding:11px 10px;font-size:13px;}
    .platform-grid{grid-template-columns:1fr;}
  }
  @media(max-width:480px){
    .ov-lang-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- ===== LANGUAGE SELECTION OVERLAY (first visit only) ===== -->
<div id="lang-overlay">
  <img src="bobo_logo.png" alt="BOBO Browser" class="ov-logo" />
  <div id="ov-title">Choose your language</div>
  <div id="ov-sub">You can change this later</div>
  <div class="ov-grid-wrap" id="ov-grid-wrap"><!-- populated by JS --></div>
  <div class="ov-continue-bar">
    <button id="ov-continue" onclick="confirmLang()">Continue</button>
  </div>
</div>

<!-- ===== NAV ===== -->
<nav>
  <div class="nav-brand">BOBO <small>BROWSER</small></div>
  <div id="lang-sel">
    <button id="lang-btn" onclick="toggleDrop(event)">
      <span id="lb-flag">🇷🇴</span>
      <span id="lb-code">RO</span>
      <span class="lb-arrow">▾</span>
    </button>
    <div id="lang-drop"><!-- populated by JS --></div>
  </div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero center">
  <img src="bobo_logo.png" alt="BOBO Browser" />
  <h1>BOBO</h1>
  <p class="tagline" data-i18n="hero_tagline"></p>
  <p class="sub" data-i18n="hero_sub"></p>
  <div style="display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:4px;">
    <div style="text-align:center;">
      <a class="btn" href="https://github.com/Bobo-Soft/bobo/releases/download/v1.6/BOBO_Browser_Setup.exe" download data-i18n="btn_download"></a>
      <span class="btn-note" data-i18n="hero_note"></span>
    </div>
    <div style="text-align:center;">
      <a class="btn-android" href="downloads/bobo_browser_1.7.apk" download data-i18n="btn_download_android"></a>
      <span class="btn-note" data-i18n="hero_note_android"></span>
    </div>
  </div>
</section>

<div class="gold-line"></div>

<!-- ===== MANIFESTO ===== -->
<section class="center">
  <h2 data-i18n="manifesto_h"></h2>
  <p class="lead" data-i18n="manifesto_p"></p>
</section>

<!-- ===== FEATURES ===== -->
<section>
  <div class="center"><h2 data-i18n="features_h"></h2></div>
  <div class="grid">
    <div class="card"><div class="ico">🔒</div><h3 data-i18n="f1_t"></h3><p data-i18n="f1_d"></p></div>
    <div class="card"><div class="ico">🛡️</div><h3 data-i18n="f2_t"></h3><p data-i18n="f2_d"></p></div>
    <div class="card"><div class="ico">👁️</div><h3 data-i18n="f3_t"></h3><p data-i18n="f3_d"></p></div>
    <div class="card"><div class="ico">🔎</div><h3 data-i18n="f4_t"></h3><p data-i18n="f4_d"></p></div>
    <div class="card"><div class="ico">🌐</div><h3 data-i18n="f5_t"></h3><p data-i18n="f5_d"></p></div>
    <div class="card"><div class="ico">⌨️</div><h3 data-i18n="f6_t"></h3><p data-i18n="f6_d"></p></div>
  </div>
</section>

<!-- ===== PRIVACY ===== -->
<div class="privacy">
<section class="center">
  <h2 data-i18n="privacy_h"></h2>
  <p class="lead" data-i18n="privacy_intro"></p>
  <table>
    <thead>
      <tr>
        <th data-i18n="th_feature"></th>
        <th>BOBO</th>
        <th data-i18n="th_others"></th>
      </tr>
    </thead>
    <tbody>
      <tr><td data-i18n="r1"></td><td class="no" data-i18n="v_no"></td><td class="yes" data-i18n="v_yes"></td></tr>
      <tr><td data-i18n="r2"></td><td class="no" data-i18n="v_no"></td><td class="yes" data-i18n="v_yes"></td></tr>
      <tr><td data-i18n="r3"></td><td class="no" data-i18n="v_no"></td><td class="yes" data-i18n="v_yes"></td></tr>
      <tr><td data-i18n="r4"></td><td class="no" data-i18n="v_no"></td><td class="yes" data-i18n="v_yes"></td></tr>
      <tr><td data-i18n="r5"></td><td class="no" data-i18n="v_no"></td><td class="yes" data-i18n="v_yes"></td></tr>
    </tbody>
  </table>
</section>
</div>

<!-- ===== DOWNLOAD ===== -->
<section class="download">
  <h2 data-i18n="download_h"></h2>
  <p class="lead" data-i18n="download_p"></p>
  <div class="platform-grid">
    <div class="platform-card">
      <div class="plat-icon">🖥️</div>
      <h3 data-i18n="plat_win_title"></h3>
      <p class="plat-req" data-i18n="plat_win_req"></p>
      <a class="btn" href="https://github.com/Bobo-Soft/bobo/releases/download/v1.6/BOBO_Browser_Setup.exe" download data-i18n="btn_download"></a>
      <span class="plat-note" data-i18n="download_note"></span>
    </div>
    <div class="platform-card">
      <div class="plat-icon">📱</div>
      <h3>Android <span class="badge-beta" data-i18n="badge_beta"></span></h3>
      <p class="plat-req" data-i18n="plat_and_req"></p>
      <a class="btn-android" href="downloads/bobo_browser_1.7.apk" download data-i18n="btn_download_android"></a>
      <span class="plat-note" data-i18n="android_note"></span>
    </div>
  </div>
</section>

<!-- ===== INSTALL GUIDE ===== -->
<div class="privacy">
<section class="center">
  <h2 data-i18n="install_h"></h2>
  <p class="lead" data-i18n="install_intro"></p>
  <div class="steps-list">
    <div class="step-item"><div class="step-num">1</div><div class="step-text" data-i18n-html="step1"></div></div>
    <div class="step-item"><div class="step-num">2</div><div class="step-text" data-i18n-html="step2"></div></div>
    <div class="step-item"><div class="step-num">3</div><div class="step-text" data-i18n-html="step3"></div></div>
    <div class="step-item"><div class="step-num">4</div><div class="step-text" data-i18n-html="step4"></div></div>
    <div class="step-item"><div class="step-num">5</div><div class="step-text" data-i18n-html="step5"></div></div>
  </div>
  <div class="safety-box" data-i18n-html="safety_text"></div>
</section>
</div>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="footer-brand">BOBO — Art &amp; Design</div>
  <div class="footer-sub" data-i18n="footer_sub"></div>
</footer>

<script>
/* ============================================================
   BOBO BROWSER — Language System
   49 languages · RTL support · First-visit overlay
   ============================================================ */

/* ---------- Language metadata (groups + order) ---------- */
var LANG_GROUPS = [
  {g:"Europa", langs:[
    {c:"ro",f:"🇷🇴",n:"Română"},
    {c:"en",f:"🇬🇧",n:"English"},
    {c:"sq",f:"🇦🇱",n:"Shqip"},
    {c:"hy",f:"🇦🇲",n:"Հայերեն"},
    {c:"az",f:"🇦🇿",n:"Azərbaycan"},

/* ============================================================
   CORE FUNCTIONS
   ============================================================ */

var _pendingLang = null;
var _curLang = "ro";

/* Get translation with English fallback */
function T(lang, key) {
  var d = I18N[lang];
  if (d && d[key] !== undefined) return d[key];
  return (I18N.en && I18N.en[key] !== undefined) ? I18N.en[key] : "";
}

/* Find lang metadata */
function langMeta(code) {
  for (var gi = 0; gi < LANG_GROUPS.length; gi++) {
    var g = LANG_GROUPS[gi];
    for (var li = 0; li < g.langs.length; li++) {
      if (g.langs[li].c === code) return g.langs[li];
    }
  }
  return null;
}

/* Apply language to entire page */
function applyLang(lang) {
  if (!I18N[lang]) lang = "en";
  _curLang = lang;
  var isRTL = !!RTL_SET[lang];

  document.documentElement.lang = lang;
  document.documentElement.dir = isRTL ? "rtl" : "ltr";
  document.title = T(lang, "page_title");

  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var k = el.getAttribute("data-i18n");
    var v = T(lang, k);
    if (v) el.textContent = v;
  });
  document.querySelectorAll("[data-i18n-html]").forEach(function(el) {
    var k = el.getAttribute("data-i18n-html");
    var v = T(lang, k);
    if (v) el.innerHTML = v;
  });

  /* Update nav button */
  var meta = langMeta(lang);
  if (meta) {
    document.getElementById("lb-flag").textContent = meta.f;
    document.getElementById("lb-code").textContent = meta.c.toUpperCase();
  }

  /* Update active state in dropdown */
  document.querySelectorAll(".dd-item").forEach(function(el) {
    el.classList.toggle("act", el.dataset.lang === lang);
  });

  localStorage.setItem("bobo_lang", lang);
}

/* ============================================================
   OVERLAY
   ============================================================ */
function buildOverlay() {
  var wrap = document.getElementById("ov-grid-wrap");
  var html = "";
  for (var gi = 0; gi < LANG_GROUPS.length; gi++) {
    var g = LANG_GROUPS[gi];
    html += "<div class=\"ov-group-hdr\">" + g.g + "</div>";
    html += "<div class=\"ov-lang-grid\">";
    for (var li = 0; li < g.langs.length; li++) {
      var l = g.langs[li];
      html += "<button class=\"ov-btn\" data-lang=\"" + l.c + "\" onclick=\"selectOvLang('" + l.c + "')\">" +
        "<span class=\"ob-flag\">" + l.f + "</span>" +
        "<span class=\"ob-name\">" + l.n + "</span>" +
        "</button>";
    }
    html += "</div>";
  }
  wrap.innerHTML = html;
}

function selectOvLang(code) {
  _pendingLang = code;
  document.querySelectorAll(".ov-btn").forEach(function(el) {
    el.classList.toggle("sel", el.dataset.lang === code);
  });
  var btn = document.getElementById("ov-continue");
  btn.classList.add("ready");
  /* Update overlay UI text to selected language */
  document.getElementById("ov-title").textContent = T(code, "overlay_title");
  document.getElementById("ov-sub").textContent = T(code, "overlay_sub");
  btn.textContent = T(code, "overlay_cont");
  /* Scroll selected button into view */
  var sel = document.querySelector(".ov-btn.sel");
  if (sel) sel.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function confirmLang() {
  if (!_pendingLang) return;
  document.getElementById("lang-overlay").style.display = "none";
  applyLang(_pendingLang);
}

/* ============================================================
   DROPDOWN
   ============================================================ */
function buildDropdown() {
  var drop = document.getElementById("lang-drop");
  var html = "";
  for (var gi = 0; gi < LANG_GROUPS.length; gi++) {
    var g = LANG_GROUPS[gi];
    html += "<div class=\"dd-group\">" + g.g + "</div>";
    for (var li = 0; li < g.langs.length; li++) {
      var l = g.langs[li];
      html += "<div class=\"dd-item\" data-lang=\"" + l.c + "\" onclick=\"chooseLang('" + l.c + "')\">" +
        "<span class=\"di-flag\">" + l.f + "</span>" +
        "<span class=\"di-name\">" + l.n + "</span>" +
        "<span class=\"di-code\">" + l.c.toUpperCase() + "</span>" +
        "</div>";
    }
  }
  drop.innerHTML = html;
}

function toggleDrop(e) {
  e.stopPropagation();
  document.getElementById("lang-drop").classList.toggle("open");
  document.getElementById("lang-btn").classList.toggle("open");
}

function chooseLang(code) {
  applyLang(code);
  document.getElementById("lang-drop").classList.remove("open");
  document.getElementById("lang-btn").classList.remove("open");
}

document.addEventListener("click", function() {
  document.getElementById("lang-drop").classList.remove("open");
  document.getElementById("lang-btn").classList.remove("open");
});

/* ============================================================
   INIT
   ============================================================ */
(function init() {
  buildDropdown();

  var saved = localStorage.getItem("bobo_lang");
  if (saved && I18N[saved]) {
    /* Already chose language — hide overlay, apply language */
    document.getElementById("lang-overlay").style.display = "none";
    applyLang(saved);
  } else {
    /* First visit — show overlay */
    buildOverlay();
    /* Detect browser language */
    var bl = ((navigator.language || (navigator.languages && navigator.languages[0]) || "en")).toLowerCase();
    var blShort = bl.split("-")[0];
    var detected = null;
    for (var gi = 0; gi < LANG_GROUPS.length; gi++) {
      for (var li = 0; li < LANG_GROUPS[gi].langs.length; li++) {
        var lc = LANG_GROUPS[gi].langs[li].c;
        if (lc === blShort || lc === bl) { detected = lc; break; }
      }
      if (detected) break;
    }
    /* Show overlay text in detected (or English) */
    var uiLang = detected || "en";
    document.getElementById("ov-title").textContent = T(uiLang, "overlay_title");
    document.getElementById("ov-sub").textContent = T(uiLang, "overlay_sub");
    document.getElementById("ov-continue").textContent = T(uiLang, "overlay_cont");
    /* Pre-select detected language */
    if (detected) {
      selectOvLang(detected);
    }
  }
})();
</script>
